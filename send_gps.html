<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>避難実験用 - 送信側画面</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        #status {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 20px; 
            font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 14px; white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="status">GPS信号を待機中...</div>
    <div id="map"></div>

    <script type="module">
        // Firebaseモジュールの読み込み（★doc と setDoc を追加しました）
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // あなた専用のFirebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyBG-JwC9VKwnSHaSkvGLzNLvXtvZ3U0q6M",
            authDomain: "heavy-rain-evacuation.firebaseapp.com",
            projectId: "heavy-rain-evacuation",
            storageBucket: "heavy-rain-evacuation.firebasestorage.app",
            appId: "1:405482442865:web:99c4a046167821b4abcbd0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 【実験エリアの定義】立正大学周辺の4点を指定
        const AREA_POLYGON = [
            [36.110889, 139.360278], [36.110306, 139.367194],
            [36.105889, 139.365111], [36.106222, 139.357861]
        ];

        // 【内外判定関数】
        function isInside(point, vs) {
            const x = point[0], y = point[1];
            let inside = false;
            for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                const xi = vs[i][0], yi = vs[i][1];
                const xj = vs[j][0], yj = vs[j][1];
                const intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        // 【デバイスID管理】
        function getDeviceId() {
            let id = localStorage.getItem('device_id');
            if (!id) {
                id = 'user_' + Math.random().toString(36).substring(2, 9);
                localStorage.setItem('device_id', id);
            }
            return id;
        }

        // 地図の表示設定
        const map = L.map('map').setView([36.1085, 139.3625], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.polygon(AREA_POLYGON, { color: 'blue', weight: 1, fillOpacity: 0.05 }).addTo(map);

        let currentPosMarker = L.circleMarker([0, 0], {
            radius: 10, color: '#FFFFFF', weight: 2, fillColor: '#007AFF', fillOpacity: 1
        }).addTo(map);

        // ★追加：ドキュメント名に使うための「現在時刻のテキスト」を作る関数
        function getTimestampString() {
            const now = new Date();
            const Y = now.getFullYear();
            const M = String(now.getMonth() + 1).padStart(2, '0');
            const D = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return `${Y}${M}${D}-${h}${m}${s}`;
        }

        // 【メイン処理】位置の取得・描画・送信をまとめた関数
        async function updateAndSendLocation() {
            if (!navigator.geolocation) return;

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                currentPosMarker.setLatLng([lat, lng]);
                map.panTo([lat, lng]);

                // 実験エリア内にいるかチェック
                if (isInside([lat, lng], AREA_POLYGON)) {
                    document.getElementById('status').innerText = "エリア内：データを送信中";
                    document.getElementById('status').style.color = "green";
                    
                    try {
                        // 🛠️ 修正：ドキュメント名を「時間-ユーザー名」に指定して保存
                        const timeId = getTimestampString();
                        const uId = getDeviceId();
                        const customDocName = `${timeId}-${uId}`; // 例: "20260609-154622-user_a1b2c3d"

                        await setDoc(doc(db, "oame_live_data", customDocName), {
                            lat: lat,
                            lng: lng,
                            timestamp: serverTimestamp(),
                            deviceId: uId
                        });
                        console.log("送信成功! ドキュメント名: " + customDocName);
                    } catch (e) { 
                        console.error("送信失敗: ", e); 
                    }
                } else {
                    document.getElementById('status').innerText = "エリア外：送信を停止しています";
                    document.getElementById('status').style.color = "red";
                }
            }, (err) => {
                console.error(err);
                document.getElementById('status').innerText = "GPS取得エラー：位置情報を許可してください";
                document.getElementById('status').style.color = "orange";
            }, { enableHighAccuracy: true });
        }

        setInterval(updateAndSendLocation, 10000);
        updateAndSendLocation(); 
    </script>
</body>
</html>
